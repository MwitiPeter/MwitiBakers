name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run smoke tests
        run: |
          # start API in background
          npm run dev:api &
          API_PID=$!
          sleep 2
          ./scripts/test-smoke.sh
          kill $API_PID || true
